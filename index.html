<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis Tareas en la Nube</title>
  <style>
    body { font-family: sans-serif; background: #eef2f3; padding: 30px; text-align: center; }
    .box { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, select, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
    button { background: #2ecc71; color: white; border: none; font-weight: bold; cursor: pointer; }
    button:hover { background: #27ae60; }
    ul { list-style: none; padding: 0; text-align: left; }
    li { background: #f9f9f9; padding: 12px; margin-bottom: 8px; border-left: 5px solid #3498db; border-radius: 3px; display: flex; justify-content: space-between; }
    .Alta { border-left-color: #e74c3c; }
    .Baja { border-left-color: #f1c40f; }
  </style>
</head>
<body>

  <div class="box">
    <h2>📝 Mi Organizador Personal</h2>
    
    <form id="formTarea">
      <input type="text" id="titulo" placeholder="¿Qué tienes que hacer hoy?" required>
      <select id="prioridad">
        <option value="Alta">🚨 Prioridad Alta</option>
        <option value="Media">🔵 Prioridad Media</option>
        <option value="Baja">🟢 Prioridad Baja</option>
      </select>
      <button type="submit">Agregar Tarea</button>
    </form>

    <h3>Mis Pendientes:</h3>
    <ul id="lista"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
